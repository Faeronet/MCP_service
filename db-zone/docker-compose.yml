# Общая сеть mcp_stack создаётся в ./stack-up.sh (docker network create).
# Проброс на хост: MCP_INTERNAL_BIND (по умолчанию 127.0.0.1); между контейнерами — mcp_postgres, mcp_redis, mcp_qdrant.
networks:
  mcp_stack:
    external: true

services:
  zone-agent:
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-zone-agent:${MCP_IMAGE_TAG:-latest}
    build:
      context: ./zone-agent
      dockerfile: Dockerfile
    environment:
      ZONE_WORKDIR: /zone
      COMPOSE_PROJECT_NAME: db-zone
      ZONE_AGENT_HOST_RESOLV_PATH: /etc/resolv.conf
      ZONE_AGENT_SECRET: ${ZONE_AGENT_SECRET:-change-me-in-production}
      LISTEN: 0.0.0.0:19090
    volumes:
      - ./:/zone
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/resolv.conf:/etc/resolv.conf:rw
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:29100:19090"
    networks:
      - mcp_stack
    restart: unless-stopped

  postgres:
    env_file: .env
    image: postgres:16-alpine
    container_name: mcp_postgres
    networks:
      - mcp_stack
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\""]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    env_file: .env
    image: postgres:16-alpine
    container_name: mcp_migrate
    networks:
      - mcp_stack
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGHOST: mcp_postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGDATABASE: ${POSTGRES_DB:-assistant}
    command: >
      sh -c "for f in /migrations/*.up.sql; do [ -f \"$$f\" ] || continue; echo Applying $$f...; psql -f \"$$f\" || true; done"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    env_file: .env
    image: redis:7-alpine
    container_name: mcp_redis
    networks:
      - mcp_stack
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    env_file: .env
    image: qdrant/qdrant:latest
    container_name: mcp_qdrant
    networks:
      - mcp_stack
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
