server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  # Логи контейнеров Docker (файлы json-file на хосте)
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      # Формат Docker json-file: {"log":"...","stream":"stdout|stderr","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
      - regex:
          expression: "^/var/lib/docker/containers/(?P<container_id>[0-9a-f]{12}).+/.+-json.log$"
          source: filename
      - labels:
          container_id:
      # Отправить в Loki содержимое поля log (сама строка лога)
      - output:
          source: output
