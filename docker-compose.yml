# Стек GPU: CUDA 12.4 (nvidia/cuda:12.4.0-runtime-ubuntu22.04 для проверки и своих образов).
# vLLM запускается только с профилем: docker compose --profile vllm up -d
# Остановка с vLLM: docker compose --profile vllm down
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8084:8080"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGDATABASE: ${POSTGRES_DB:-assistant}
    volumes:
      - ./migrations:/migrations:ro
    command: >
      sh -c "for f in /migrations/*.up.sql; do [ -f \"$$f\" ] || continue; echo Applying $$f...; psql -f \"$$f\" || true; done"
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      # Доступ с другого ПК: http://IP_СЕРВЕРА:9000 (API), http://IP_СЕРВЕРА:9001 (консоль)
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    # healthcheck не задан: образ без wget/curl/bash; зависимости используют condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  promtail:
    # 2.9.2 использует Docker API 1.42; демон требует 1.44 — нужен образ 3.x
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Доступ к логам контейнеров (без этого Loki остаётся пустым)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Обязательно: URL, по которому открываете Grafana в браузере (админка + /api/grafana).
      # По IP: GRAFANA_ROOT_URL=http://192.168.1.10:5173/api/grafana
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://100.79.22.35:5173/api/grafana}
      # В v10 при прокси со срезанием пути — false (иначе "failed to load")
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # Не обращаться к grafana.com (избегаем 451 при блокировке в сети)
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "*"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_UPDATE_CHECKER_ENABLED: "false"
      # Доступ через прокси admin-backend: JWT проверяется на прокси, в Grafana пускаем как анонимный Viewer
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - loki

  # vLLM (чат). Для 24 ГБ используйте AWQ-модель (~10 ГБ VRAM); полная Qwen3-14B в bf16 не помещается.
  # Порядок запуска AI: vllm → vllm-embed → rerank, extract-tool (rerank и extract-tool ждут готовности vllm-embed).
  vllm:
    profiles:
      - vllm
    image: vllm/vllm-openai:v0.16.0
    command: ["--model", "${VLLM_MODEL_NAME:-Qwen/Qwen3-14B-AWQ}", "--port", "8000", "--gpu-memory-utilization", "0.9"]
    deploy:
      resources:
        limits:
          memory: 24g
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    volumes:
      - ./models:/models
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu:/usr/local/lib"
      HF_HOME: /models
      VLLM_ENABLE_CUDA_COMPATIBILITY: "0"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 300s
    restart: unless-stopped

  # vLLM для эмбеддингов. Запускается после vllm. Пока не станет healthy, rerank и extract-tool не стартуют.
  # При одной видеокарте — та же GPU 0: задаём --gpu-memory-utilization 0.35, чтобы поместиться рядом с vllm (чат).
  # При двух GPU: device_ids: ['1'] и NVIDIA_VISIBLE_DEVICES=1 — эмбеддинги на GPU 1.
  vllm-embed:
    profiles:
      - vllm
    image: vllm/vllm-openai:v0.16.0
    command: ["--model", "BAAI/bge-m3", "--port", "8000", "--gpu-memory-utilization", "0.30"]
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    volumes:
      - ./models:/models
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu:/usr/local/lib"
      HF_HOME: /models
      VLLM_ENABLE_CUDA_COMPATIBILITY: "0"
    ports:
      - "8002:8000"
    depends_on:
      vllm: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 300s
    restart: unless-stopped

  # Реранкер (BAAI/bge-reranker-v2-m3) — та же GPU 1, что и vllm-embed. Запускается после полной готовности vllm-embed.
  rerank:
    profiles:
      - vllm
    build:
      context: ./reranker
      dockerfile: Dockerfile
    environment:
      PORT: "8787"
      MAX_LENGTH: "512"
      MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    ports:
      - "8787:8787"
    depends_on:
      vllm-embed: { condition: service_healthy }
    restart: unless-stopped

  # --- Application services ---
  admin-backend:
    build:
      context: .
      dockerfile: admin-backend/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-168}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      MCP_WRITE_URL: http://mcp-write:8001
      LOKI_URL: http://loki:3100
      GRAFANA_URL: http://grafana:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      minio: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin-web-ui:
    build:
      context: .
      dockerfile: admin-web-ui/Dockerfile
      args:
        VITE_MONITOR_POLL_MS: ${VITE_MONITOR_POLL_MS:-30000}
    ports:
      - "5173:80"
    depends_on:
      - admin-backend

  tg-bot:
    build:
      context: .
      dockerfile: tg-bot/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_DEBUG: ${BOT_DEBUG:-0}
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_ATTACHMENTS_BUCKET: ${MINIO_ATTACHMENTS_BUCKET:-attachments}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      MCP_PROXY_URL: http://mcp-proxy:8083
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://extract-tool:8004}
      EXTRACT_TOOL_URL: ${EXTRACT_TOOL_URL:-http://extract-tool:8004}
      WORKER_CONCURRENCY: ${BOT_WORKER_CONCURRENCY:-64}
      PER_CHAT_DEBOUNCE_MS: ${PER_CHAT_DEBOUNCE_MS:-500}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      minio: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      mcp-proxy: { condition: service_started }
      extract-tool: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp-proxy:
    build:
      context: .
      dockerfile: mcp-proxy/Dockerfile
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      MCP_READ_URL: http://mcp-read:8082
      VLLM_OPENAI_BASE: ${VLLM_OPENAI_BASE:-http://vllm:8000/v1}
      LLM_BINDING_HOST: ${LLM_BINDING_HOST:-}
      LLM_BINDING_API_KEY: ${LLM_BINDING_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-14B-AWQ}
      MAX_INFLIGHT_LLM: ${MAX_INFLIGHT_LLM:-32}
      BOT_DEBUG: ${BOT_DEBUG:-0}
    ports:
      - "8083:8083"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      mcp-read: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp-read:
    build:
      context: .
      dockerfile: mcp-read/Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      VLLM_OPENAI_BASE: ${VLLM_OPENAI_BASE:-http://vllm:8000/v1}
      # Эмбеддинги: при профиле vllm используется vllm-embed (BAAI/bge-m3)
      EMBED_API_URL: ${EMBED_API_URL:-http://vllm-embed:8000/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      RERANK_BINDING_HOST: ${RERANK_BINDING_HOST:-http://rerank:8787/api/v1}
      RERANK_API_URL: ${RERANK_API_URL:-http://rerank:8787/api/v1}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANK_MIN_SCORE: ${RERANK_MIN_SCORE}
      REDIS_ADDR: redis:6379
      RETRIEVAL_CACHE_TTL_SEC: ${MCP_READ_CACHE_TTL:-60}
      EMBED_CACHE_TTL_SEC: ${EMBED_CACHE_TTL:-30}
      MAX_INFLIGHT_RERANK: ${MAX_INFLIGHT_RERANK:-16}
      MAX_INFLIGHT_EMBED: ${MAX_INFLIGHT_EMBED:-32}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    depends_on:
      qdrant: { condition: service_started }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp-write:
    build:
      context: .
      dockerfile: mcp-write/Dockerfile
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      VLLM_OPENAI_BASE: ${VLLM_OPENAI_BASE:-http://vllm:8000/v1}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-14B-AWQ}
      USE_LLM_CHUNKING: ${USE_LLM_CHUNKING:-}
      USE_LLM_RERANK_QUERY: ${USE_LLM_RERANK_QUERY:-}
      INGESTION_SYSTEM: ${INGESTION_SYSTEM:-B}
      EMBED_API_URL: ${EMBED_API_URL:-http://vllm-embed:8000/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      RERANK_BINDING_HOST: ${RERANK_BINDING_HOST:-http://rerank:8787/api/v1}
      RERANK_API_URL: ${RERANK_API_URL:-http://rerank:8787/api/v1}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      qdrant: { condition: service_started }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  ingestion-worker:
    build:
      context: .
      dockerfile: ingestion-worker/Dockerfile
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      MCP_WRITE_URL: http://mcp-write:8001
      WORKER_CONCURRENCY: ${INGESTION_WORKER_CONCURRENCY:-4}
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      rabbitmq: { condition: service_healthy }
      mcp-write: { condition: service_started }
    restart: unless-stopped

  # extract-tool: извлечение текста (OCR, ASR, текст, PDF, архивы). При --profile vllm порядок: vllm → vllm-embed → rerank (extract-tool независим).
  extract-tool:
    build:
      context: ./extract-tool
      dockerfile: Dockerfile
    environment:
      PORT: "8004"
      NVIDIA_VISIBLE_DEVICES: "1"
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /tmp/hf_cache
      ASR_MODEL: ${ASR_MODEL:-openai/whisper-large-v3}
      ASR_LANGUAGE: ${ASR_LANGUAGE:-ru}
      OCR_MODEL: ${OCR_MODEL:-PaddlePaddle/PaddleOCR-VL-1.5}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-ru,en}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    ports:
      - "8004:8004"
    restart: unless-stopped

  attachment-worker:
    build:
      context: .
      dockerfile: attachment-worker/Dockerfile
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_ATTACHMENTS_BUCKET: ${MINIO_ATTACHMENTS_BUCKET:-attachments}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      WORKER_CONCURRENCY: ${ATTACHMENT_WORKER_CONCURRENCY:-4}
      OCR_MODEL: ${OCR_MODEL:-PaddlePaddle/PaddleOCR-VL-1.5}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://extract-tool:8004}
      ASR_SERVICE_URL: ${ASR_SERVICE_URL:-http://extract-tool:8004}
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      minio: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  log-indexer:
    build:
      context: .
      dockerfile: log-indexer/Dockerfile
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assistant}?sslmode=disable
      LOKI_URL: http://loki:3100
      INDEX_INTERVAL_SEC: ${LOG_INDEX_INTERVAL_SEC:-30}
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      loki: { condition: service_healthy }
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  loki_data:
  grafana_data:
