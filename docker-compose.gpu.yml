# Опциональный override: мониторинг GPU в админке (nvidia-smi).
# Использование: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Требует: NVIDIA Container Toolkit. Стек: CUDA 12.4 (см. README).
services:
  admin-backend:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
