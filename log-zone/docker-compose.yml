services:
  loki:
    env_file: .env
    image: grafana/loki:2.9.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    env_file: .env
    image: grafana/grafana:10.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:5173/api/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "*"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_UPDATE_CHECKER_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - loki
    restart: unless-stopped

  log-indexer:
    env_file: .env
    build:
      context: .
      dockerfile: log-indexer/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      loki: { condition: service_healthy }
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
