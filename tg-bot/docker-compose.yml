networks:
  mcp_stack:
    external: true

services:
  zone-agent:
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-zone-agent:${MCP_IMAGE_TAG:-latest}
    build:
      context: ./zone-agent
      dockerfile: Dockerfile
    environment:
      ZONE_WORKDIR: /zone
      # Имя проекта compose: иначе при /zone все зоны получают project "zone" и затирают чужие контейнеры.
      COMPOSE_PROJECT_NAME: tg-bot
      ZONE_AGENT_HOST_RESOLV_PATH: /etc/resolv.conf
      ZONE_AGENT_SECRET: ${ZONE_AGENT_SECRET:-change-me-in-production}
      LISTEN: 0.0.0.0:19090
    volumes:
      - ./:/zone
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/resolv.conf:/etc/resolv.conf:rw
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:29108:19090"
    networks:
      - mcp_stack
    restart: unless-stopped

  wait-postgres:
    image: postgres:16-alpine
    networks:
      - mcp_stack
    env_file: .env
    entrypoint:
      - /bin/sh
      - -c
      - 'until pg_isready -h mcp_postgres -U "$${POSTGRES_USER:-postgres}"; do sleep 1; done'
    restart: "no"

  wait-migrate:
    image: postgres:16-alpine
    networks:
      - mcp_stack
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      wait-postgres:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -n "$$POSTGRES_DSN" ]; then
          PSQL="psql $$POSTGRES_DSN"
        else
          PSQL="psql -h mcp_postgres -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-assistant}"
        fi
        for i in $$(seq 1 90); do
          out=$$($$PSQL -tAc "SELECT 1 FROM information_schema.tables WHERE table_schema='chat' AND table_name='sessions'" 2>&1) || true
          echo "$$out" | grep -q 1 && exit 0
          sleep 2
        done
        echo "wait-migrate: chat.sessions not found after 3m" >&2
        $$PSQL -c "\dt chat.*" 2>&1 || echo "wait-migrate: cannot connect to postgres — check POSTGRES_DSN / POSTGRES_PASSWORD in .env" >&2
        echo "Fix: cd ~/MCP_service/db-zone && docker compose build migrate && docker compose run --rm migrate" >&2
        exit 1
    restart: "no"

  tg-bot:
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-tg-bot:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp_tg_bot
    networks:
      - mcp_stack
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Long polling — входящих подключений из интернета не нужно; :8081 только healthcheck (localhost на хосте).
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:8081:8081"
    depends_on:
      wait-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  promtail:
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-promtail-tg-bot:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.promtail
    networks:
      - mcp_stack
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
