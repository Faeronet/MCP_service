services:
  vllm:
    profiles: [vllm]
    env_file: .env
    image: vllm/vllm-openai:v0.16.0
    command:
      - --model
      - ${VLLM_MODEL_NAME:-Qwen/Qwen3-14B-AWQ}
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.9"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-8192}"
    deploy:
      resources:
        limits:
          memory: 24g
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    volumes:
      - ./models:/models
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu:/usr/local/lib"
      HF_HOME: /models
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_ENABLE_CUDA_COMPATIBILITY: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  vllm-embed:
    profiles: [vllm]
    env_file: .env
    image: vllm/vllm-openai:v0.16.0
    command: ["--model", "BAAI/bge-m3", "--port", "8000", "--gpu-memory-utilization", "0.30"]
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    volumes:
      - ./models:/models
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES_EMBED:-0}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu:/usr/local/lib"
      HF_HOME: /models
      VLLM_ENABLE_CUDA_COMPATIBILITY: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8000"
    restart: unless-stopped

  rerank:
    profiles: [vllm]
    env_file: .env
    build:
      context: ./reranker
      dockerfile: Dockerfile
    environment:
      PORT: "8787"
      MAX_LENGTH: "512"
      MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES_RERANK:-0}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8787:8787"
    restart: unless-stopped

  promtail:
    env_file: .env
    image: grafana/promtail:3.0.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.tpl:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
