networks:
  mcp_stack:
    external: true

services:
  zone-agent:
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-zone-agent:${MCP_IMAGE_TAG:-latest}
    build:
      context: ./zone-agent
      dockerfile: Dockerfile
    environment:
      ZONE_WORKDIR: /zone
      COMPOSE_PROJECT_NAME: file-orchestrator
      ZONE_AGENT_HOST_RESOLV_PATH: /etc/resolv.conf
      ZONE_AGENT_SECRET: ${ZONE_AGENT_SECRET:-change-me-in-production}
      LISTEN: 0.0.0.0:19090
    volumes:
      - ./:/zone
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/resolv.conf:/etc/resolv.conf:rw
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:29104:19090"
    networks:
      - mcp_stack
    restart: unless-stopped

  minio:
    env_file: .env
    image: minio/minio:latest
    container_name: mcp_minio
    networks:
      - mcp_stack
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
    volumes:
      - minio_data:/data
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:9000:9000"
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    env_file: .env
    image: rabbitmq:3-management-alpine
    container_name: mcp_rabbitmq
    networks:
      - mcp_stack
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:5672:5672"
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  minio_data:
