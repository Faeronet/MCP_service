networks:
  mcp_stack:
    external: true

services:
  zone-agent:
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-zone-agent:${MCP_IMAGE_TAG:-latest}
    build:
      context: ./zone-agent
      dockerfile: Dockerfile
    environment:
      ZONE_WORKDIR: /zone
      COMPOSE_PROJECT_NAME: admin-zone
      ZONE_AGENT_HOST_RESOLV_PATH: /etc/resolv.conf
      ZONE_AGENT_SECRET: ${ZONE_AGENT_SECRET:-change-me-in-production}
      LISTEN: 0.0.0.0:19090
    volumes:
      - ./:/zone
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/resolv.conf:/etc/resolv.conf:rw
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:29110:19090"
    networks:
      - mcp_stack
    restart: unless-stopped

  wait-postgres:
    image: postgres:16-alpine
    networks:
      - mcp_stack
    env_file: .env
    entrypoint:
      - /bin/sh
      - -c
      - 'until pg_isready -h mcp_postgres -U "$${POSTGRES_USER:-postgres}"; do sleep 1; done'
    restart: "no"

  admin-backend:
    # API только внутри Docker-сети mcp_stack; снаружи — через admin-web-ui (nginx /api).
    # Образ на базе CUDA уже содержит nvidia-smi; без проброса GPU контейнер не видит карту — метрики GPU будут нули.
    # См. docker-compose.nvidia.yml (docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d).
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-admin-backend:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: admin-backend/Dockerfile
    container_name: mcp_admin_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcp_stack
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      wait-postgres:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin-web-ui:
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-admin-web-ui:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: admin-web-ui/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_MONITOR_POLL_MS: ${VITE_MONITOR_POLL_MS:-30000}
    environment:
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-}
    networks:
      - mcp_stack
    ports:
      - "${MCP_PUBLIC_BIND:-0.0.0.0}:5173:80"
    depends_on:
      - admin-backend
    restart: unless-stopped

  adminer:
    env_file: .env
    image: adminer:4
    container_name: mcp_adminer
    networks:
      - mcp_stack
    environment:
      ADMINER_DEFAULT_SERVER: ${POSTGRES_HOST:-mcp_postgres}
    depends_on:
      wait-postgres:
        condition: service_completed_successfully
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:8089:8080"
    restart: unless-stopped

  promtail:
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-promtail-admin-zone:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.promtail
    networks:
      - mcp_stack
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
