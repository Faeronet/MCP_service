services:
  admin-backend:
    env_file: .env
    build:
      context: .
      dockerfile: admin-backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin-web-ui:
    env_file: .env
    build:
      context: .
      dockerfile: admin-web-ui/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_MONITOR_POLL_MS: ${VITE_MONITOR_POLL_MS:-30000}
    ports:
      - "5173:80"
    depends_on:
      - admin-backend
    restart: unless-stopped

  adminer:
    env_file: .env
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: ${POSTGRES_HOST:-host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8089:8080"
    restart: unless-stopped

  promtail:
    env_file: .env
    image: grafana/promtail:3.0.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.tpl:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
