networks:
  mcp_stack:
    external: true

services:
  zone-agent:
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-zone-agent:${MCP_IMAGE_TAG:-latest}
    build:
      context: ./zone-agent
      dockerfile: Dockerfile
    environment:
      ZONE_WORKDIR: /zone
      COMPOSE_PROJECT_NAME: angels-web
      ZONE_AGENT_HOST_RESOLV_PATH: /etc/resolv.conf
      ZONE_AGENT_SECRET: ${ZONE_AGENT_SECRET:-change-me-in-production}
      LISTEN: 0.0.0.0:19090
    volumes:
      - ./:/zone
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/resolv.conf:/etc/resolv.conf:rw
    ports:
      - "${MCP_INTERNAL_BIND:-127.0.0.1}:29102:19090"
    networks:
      - mcp_stack
    restart: unless-stopped

  angels-web:
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-angels-web:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp_angels_web
    networks:
      - mcp_stack
    ports:
      - "${MCP_PUBLIC_BIND:-0.0.0.0}:3000:3000"
    restart: unless-stopped

  promtail:
    env_file: .env
    image: ${MCP_IMAGE_REGISTRY}${MCP_IMAGE_REGISTRY:+/}mcp-promtail-angels-web:${MCP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.promtail
    networks:
      - mcp_stack
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
