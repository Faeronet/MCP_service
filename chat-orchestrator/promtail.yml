server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://__LOKI_HOST__:3100/loki/api/v1/push
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - target_label: job
        replacement: docker
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: '^chat-orchestrator$'
        action: keep
      - source_labels: ['__meta_docker_container_id']
        regex: '(.+)'
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/$1-json.log'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - json:
          expressions:
            output: log
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      # stream не выносить в labels из JSON: при битой строке значение пустое → Loki 400 «no label pair».
      # Поток уже помечен relabel: __meta_docker_container_log_stream → stream
      - output:
          source: output
