services:
  mcp-read:
    env_file: .env
    build:
      context: .
      dockerfile: mcp-read/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp-proxy:
    env_file: .env
    build:
      context: .
      dockerfile: mcp-proxy/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8083:8083"
    depends_on:
      mcp-read: { condition: service_started }
    restart: unless-stopped

  promtail:
    env_file: .env
    image: grafana/promtail:3.0.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.tpl:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
