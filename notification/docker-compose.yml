services:
  scheduler:
    env_file: .env
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  promtail:
    env_file: .env
    image: grafana/promtail:3.0.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.tpl:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
