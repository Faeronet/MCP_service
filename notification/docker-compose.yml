networks:
  mcp_stack:
    external: true

services:
  zone-agent:
    build:
      context: ./zone-agent
      dockerfile: Dockerfile
    environment:
      ZONE_WORKDIR: /zone
      COMPOSE_PROJECT_NAME: notification
      ZONE_AGENT_SECRET: ${ZONE_AGENT_SECRET:-change-me-in-production}
      LISTEN: 0.0.0.0:19090
    volumes:
      - ./:/zone
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "0.0.0.0:29107:19090"
    networks:
      - mcp_stack
    restart: unless-stopped

  wait-postgres:
    image: postgres:16-alpine
    networks:
      - mcp_stack
    env_file: .env
    entrypoint:
      - /bin/sh
      - -c
      - 'until pg_isready -h mcp_postgres -U "$${POSTGRES_USER:-postgres}"; do sleep 1; done'
    restart: "no"

  scheduler:
    env_file: .env
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: mcp_scheduler
    networks:
      - mcp_stack
    ports:
      - "0.0.0.0:8090:8090"
    depends_on:
      wait-postgres:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  promtail:
    env_file: .env
    image: grafana/promtail:3.0.0
    networks:
      - mcp_stack
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HOST__/$${LOKI_HOST}/g" /etc/promtail/config.tpl > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.tpl:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
